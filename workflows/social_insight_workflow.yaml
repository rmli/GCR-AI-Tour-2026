kind: Workflow
trigger:
  kind: OnConversationStart
  id: social_insight_workflow
  actions:
    # ============================================================================
    # Phase 0: Initialization and Configuration
    # ============================================================================
    - kind: SendActivity
      id: welcome_message
      activity: "🚀 社会洞察多Agent工作流启动"
    
    - kind: SendActivity
      id: explain_workflow
      activity: |-
        本工作流将执行以下步骤:
        1. 信号采集 (SignalIngestionAgent)
        2. 热点聚类 (HotspotClusteringAgent)
        3. 社会洞察 (InsightAgent)
        4. 策略生成 (ContentStrategyAgent)
    
    # Set configuration variables
    - kind: SetTextVariable
      id: set_output_dir
      variable: Local.OutputDir
      value: "generated/social_insight_output"
    
    - kind: SetTextVariable
      id: set_api_config_path
      variable: Local.ApiConfigPath
      value: "config/hot_api_list.json"
    
    - kind: SetVariable
      id: set_time_window
      variable: Local.TimeWindowHours
      value: 24
    
    # ============================================================================
    # Phase 1: Signal Ingestion (Deterministic Tool)
    # ============================================================================
    - kind: SendActivity
      id: phase1_start
      activity: "📡 Phase 1: 正在采集多平台热点信号..."
    
    - kind: SetTextVariable
      id: prepare_signal_ingestion_prompt
      variable: Local.SignalIngestionPrompt
      value: |-
        {
          "tool": "social.ingest_signals",
          "args": {
            "hot_api_list_path": "{Local.ApiConfigPath}",
            "output_dir": "{Local.OutputDir}",
            "time_window_hours": {Local.TimeWindowHours}
          }
        }
    
    - kind: InvokeAzureAgent
      id: call_signal_ingestion
      agent:
        name: LocalToolExecutorAgent
      input:
        messages: =UserMessage(Local.SignalIngestionPrompt)
      output:
        responseObject: Local.SignalIngestionResult
    
    - kind: SendActivity
      id: signal_ingestion_complete
      activity: "✅ 信号采集完成: {Local.SignalIngestionResult}"
    
    # ============================================================================
    # Phase 2: Hotspot Clustering (LLM-first + Tool-fallback)
    # ============================================================================
    - kind: SendActivity
      id: phase2_start
      activity: "🔍 Phase 2: 正在进行热点聚类分析..."

    # Azure AI Foundry agents cannot access local files. Load raw signals into prompt text.
    - kind: SetTextVariable
      id: prepare_raw_signals_for_prompt
      variable: Local.LoadRawSignalsForPrompt
      value: |-
        {
          "tool": "social.load_raw_signals_for_prompt",
          "args": {
            "raw_signals_path": "{Local.OutputDir}/raw_signals.json",
            "max_signals": 60,
            "max_chars": 12000
          }
        }

    - kind: InvokeAzureAgent
      id: call_load_raw_signals_for_prompt
      agent:
        name: LocalToolExecutorAgent
      input:
        messages: =UserMessage(Local.LoadRawSignalsForPrompt)
      output:
        responseObject: Local.RawSignalsForPromptText
    
    - kind: SetTextVariable
      id: prepare_clustering_prompt
      variable: Local.ClusteringPrompt
      value: |-
        # 任务：热点聚类
        
        你需要分析原始信号数据，将相似的信号聚合为核心热点。
        
        **输入数据路径**: {Local.OutputDir}/raw_signals.json

        **原始信号数据（节选，JSON）**:
        {Local.RawSignalsForPromptText}
        
        **要求**:
        1. 判断哪些信号实际上在讨论同一个话题或事件
        2. 将信号聚合为 3-5 个核心热点
        3. 为每个热点生成一句话概括和简短摘要
        4. 评估热度分数 (0-1) 和是否建议追踪
        
        **输出格式** (必须是有效的JSON):
        {
          "hotspots": [
            {
              "hotspot_id": "H1",
              "title": "一句话概括",
              "summary": "发生了什么",
              "signals": ["signal_id_1", "signal_id_2"],
              "platforms": ["weibo", "douyin"],
              "heat_score": 0.87,
              "should_chase": true
            }
          ]
        }
        
        请直接输出JSON，不要添加任何额外的解释文字。
    
    - kind: InvokeAzureAgent
      id: call_clustering_agent
      agent:
        name: HotspotClusteringAgent
      input:
        messages: =UserMessage(Local.ClusteringPrompt)
      output:
        messages: Local.ClusteringResult
    
    - kind: SendActivity
      id: clustering_status
      activity: "聚类分析完成，结果: {MessageText(Local.ClusteringResult)}"
    
    # Fallback clustering if LLM output is invalid
    - kind: SendActivity
      id: clustering_fallback_message
      activity: "🔄 执行兜底聚类策略..."
    
    - kind: SetTextVariable
      id: prepare_clustering_fallback_prompt
      variable: Local.ClusteringFallbackPrompt
      value: |-
        {
          "tool": "social.cluster_signals_fallback",
          "args": {
            "raw_signals_path": "{Local.OutputDir}/raw_signals.json",
            "output_dir": "{Local.OutputDir}",
            "top_k": 5
          }
        }
    
    - kind: InvokeAzureAgent
      id: call_clustering_fallback
      agent:
        name: LocalToolExecutorAgent
      input:
        messages: =UserMessage(Local.ClusteringFallbackPrompt)
      output:
        responseObject: Local.ClusteringFallbackResult
    
    - kind: SendActivity
      id: clustering_complete
      activity: "✅ 热点聚类完成"
    
    # ============================================================================
    # Phase 3: Insight Analysis (High-cognition LLM Agent)
    # ============================================================================
    - kind: SendActivity
      id: phase3_start
      activity: "🧠 Phase 3: 正在生成社会洞察..."
    
    - kind: SetTextVariable
      id: prepare_insight_prompt
      variable: Local.InsightPrompt
      value: |-
        # 任务：社会洞察分析
        
        你需要对识别出的热点进行深度社会洞察分析。
        
        **输入数据路径**: {Local.OutputDir}/clusters/hotspots.json
        
        **分析维度**:
        1. **why_now**: 这件事为什么在此刻、以这种方式火了？触发机制是什么？
        2. **core_audience**: 核心受众群体有哪些？他们的特征是什么？
        3. **emotion_structure**: 情绪结构分析（主导情绪和次要情绪）
        4. **content_nature**: 内容本质（冲突型、共鸣型、身份认同等）
        5. **risk_notes**: 风险提示（争议风险、平台审核要点）
        
        **输出格式** (必须是有效的JSON):
        {
          "insights": [
            {
              "hotspot_id": "H1",
              "why_now": "触发机制/社会背景",
              "core_audience": ["群体A", "群体B"],
              "emotion_structure": {
                "dominant": "愤怒",
                "secondary": ["焦虑", "戏谑"]
              },
              "content_nature": ["冲突型", "身份认同"],
              "risk_notes": ["争议风险", "平台审核点"]
            }
          ]
        }
        
        请直接输出JSON，不要添加任何额外的解释文字。
    
    - kind: InvokeAzureAgent
      id: call_insight_agent
      agent:
        name: InsightAgent
      input:
        messages: =UserMessage(Local.InsightPrompt)
      output:
        messages: Local.InsightResult
    
    - kind: SendActivity
      id: insight_status
      activity: "洞察分析完成，结果: {MessageText(Local.InsightResult)}"
    
    # Fallback insight generation
    - kind: SendActivity
      id: insight_fallback_message
      activity: "🔄 执行兜底洞察生成..."
    
    - kind: SetTextVariable
      id: prepare_insight_fallback_prompt
      variable: Local.InsightFallbackPrompt
      value: |-
        {
          "tool": "social.insight_analysis_fallback",
          "args": {
            "hotspots_path": "{Local.OutputDir}/clusters/hotspots.json",
            "output_dir": "{Local.OutputDir}"
          }
        }
    
    - kind: InvokeAzureAgent
      id: call_insight_fallback
      agent:
        name: LocalToolExecutorAgent
      input:
        messages: =UserMessage(Local.InsightFallbackPrompt)
      output:
        responseObject: Local.InsightFallbackResult
    
    - kind: SendActivity
      id: insight_complete
      activity: "✅ 社会洞察完成"
    
    # ============================================================================
    # Phase 4: Content Strategy (Decision Translation Agent)
    # ============================================================================
    - kind: SendActivity
      id: phase4_start
      activity: "📋 Phase 4: 正在生成内容策略建议..."
    
    - kind: SetTextVariable
      id: prepare_strategy_prompt
      variable: Local.StrategyPrompt
      value: |-
        # 任务：平台级内容投放策略生成
        
        你需要将洞察翻译成不同平台的具体投放建议。
        
        **输入数据**:
        - 热点数据: {Local.OutputDir}/clusters/hotspots.json
        - 洞察数据: {Local.OutputDir}/insights/insights.json
        
        **输出要求**:
        生成一份结构化的Markdown报告，必须包含以下章节：
        
        ## 当前核心热点列表
        - H1｜一句话｜热度评分｜是否建议追
        
        ## 平台级投放建议
        
        ### 短视频平台（抖音/快手）
        - 适配热点：
        - 建议角度：
        - 风险提示：
        
        ### 社交平台（微博/知乎）
        - 适配热点：
        - 建议角度：
        - 风险提示：
        
        ## 不建议追的热点说明
        
        **注意**:
        1. 这是策略建议，不是具体文案
        2. 必须覆盖所有识别出的热点
        3. 风险提示要具体可执行
        
        请生成完整的Markdown报告。
    
    - kind: InvokeAzureAgent
      id: call_strategy_agent
      agent:
        name: ContentStrategyAgent
      input:
        messages: =UserMessage(Local.StrategyPrompt)
      output:
        messages: Local.StrategyResult
    
    - kind: SendActivity
      id: strategy_status
      activity: "策略生成完成"
    
    # Fallback report rendering
    - kind: SendActivity
      id: strategy_fallback_message
      activity: "🔄 执行兜底报告生成..."
    
    - kind: SetTextVariable
      id: prepare_strategy_fallback_prompt
      variable: Local.StrategyFallbackPrompt
      value: |-
        {
          "tool": "social.render_strategy_report_fallback",
          "args": {
            "hotspots_path": "{Local.OutputDir}/clusters/hotspots.json",
            "insights_path": "{Local.OutputDir}/insights/insights.json",
            "output_dir": "{Local.OutputDir}"
          }
        }
    
    - kind: InvokeAzureAgent
      id: call_strategy_fallback
      agent:
        name: LocalToolExecutorAgent
      input:
        messages: =UserMessage(Local.StrategyFallbackPrompt)
      output:
        responseObject: Local.StrategyFallbackResult
    
    - kind: SendActivity
      id: strategy_complete
      activity: "✅ 内容策略生成完成"
    
    # ============================================================================
    # Final Summary
    # ============================================================================
    - kind: SendActivity
      id: workflow_complete
      activity: |-
        🎉 社会洞察工作流执行完成！
        
        **输出文件**:
        - 原始信号: {Local.OutputDir}/raw_signals.json
        - 热点聚类: {Local.OutputDir}/clusters/hotspots.json
        - 社会洞察: {Local.OutputDir}/insights/insights.json
        - 策略报告: {Local.OutputDir}/report.md
        
        所有中间结果均已落盘，支持回溯和审计。
    
    - kind: EndConversation
      id: end_workflow
